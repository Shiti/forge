name: forge Contract Tests

on:
    push:
        paths:
            - "forge-go/**"
            - "forge-python/**"
    pull_request:
        paths:
            - "forge-go/**"
            - "forge-python/**"

jobs:
    contract-tests:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.22.x"

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.13"

            - name: Build forge-go binary
              working-directory: ./forge-go
              run: make build

            - name: Install Poetry
              run: curl -sSL https://install.python-poetry.org | python3 -

            - name: Install forge-python dependencies
              working-directory: ./forge-python
              run: poetry install

            - name: Run Contract Tests
              working-directory: ./forge-python
              run: poetry run pytest tests/contract/
